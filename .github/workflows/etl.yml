name: Daily ETL — Fetch Oil Market Data

on:
  schedule:
    # 每天 UTC 14:00（美东 9AM / 北京 22:00）运行
    # EIA 周报周三发布，CFTC 周五发布，这个时间能覆盖大多数数据更新
    - cron: '0 14 * * *'
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write

jobs:
  etl:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt

      - name: Install dependencies
        run: pip install -r etl/requirements.txt

      - name: Run ETL pipeline
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          cd $GITHUB_WORKSPACE
          python etl/run_all.py 2>&1

      - name: Commit & push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # 只在有变化时提交
          if git diff --cached --quiet; then
            echo "📭 数据无变化，跳过提交"
          else
            DATE=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "data: ETL update ${DATE}"
            git push
            echo "✅ 数据已推送到 GitHub"
          fi
